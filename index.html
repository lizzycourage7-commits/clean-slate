<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clean Slate AI</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#020617;
    color:white;
}

header{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    padding:30px 20px;
    text-align:center;
    border-bottom:1px solid #334155;
    border-radius:0 0 25px 25px;
}

header h1{
    margin:0;
    color:#38bdf8;
    font-size:34px;
    letter-spacing:1px;
}

header p{
    color:#cbd5e1;
    margin-top:10px;
}

header h1{
    margin:0;
    color:#38bdf8;
    font-size:30px;
}

header p{
    color:#94a3b8;
}

.container{
    padding:20px;
    max-width:600px;
    margin:auto;
}

.card{
    background:linear-gradient(145deg,#111827,#1e293b);
    padding:22px;
    border-radius:20px;
    margin-bottom:20px;
    border:1px solid #334155;
    box-shadow:0 8px 25px rgba(0,0,0,0.35);
}

h2{
    margin-top:0;
    color:#38bdf8;
}

select,button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border-radius:12px;
    border:none;
    font-size:16px;
}

select{
    background:#1e293b;
    color:white;
}

button{
    background:linear-gradient(135deg,#38bdf8,#0ea5e9);
    color:#020617;
    font-weight:bold;
    cursor:pointer;
    font-size:18px;
    box-shadow:0 5px 15px rgba(56,189,248,0.3);
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
    opacity:0.9;
}

button:hover{
    opacity:0.8;
}

.result{
    margin-top:20px;
    padding:20px;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    border-radius:18px;
    text-align:center;
    border:1px solid #38bdf8;
    animation:fadeIn 0.5s ease;
}

.result p:first-child{
    font-size:28px;
    font-weight:bold;
    color:#38bdf8;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.confidence{
    color:#22c55e;
    font-size:20px;
    font-weight:bold;
}

</style>

</head>

<body>

<header>

<h1>Clean Slate AI</h1>
<p>Volatility Market Analysis Dashboard</p>

</header>


<div class="container">


<div class="card">

<h2>Select Market</h2>

<select id="market">

<option>Volatility 100 (1s)</option>
<option>Volatility 75 (1s)</option>
<option>Volatility 50 (1s)</option>
<option>Volatility 25 (1s)</option>

<option>Volatility 100 Index</option>
<option>Volatility 75 Index</option>
<option>Volatility 50 Index</option>
<option>Volatility 25 Index</option>

</select>

</div>

<div class="card">

<h2>Select Prediction Type</h2>

<select id="predictionType">

<option>Matches Prediction</option>
<option>Differs Prediction</option>
<option>Even Prediction</option>
<option>Odd Prediction</option>
<option>Over Prediction</option>
<option>Under Prediction</option>

</select>

<button onclick="generatePrediction()">
Generate Prediction
</button>

</div>

<div class="card">

<h2>Tick Sample Size</h2>

<select id="tickCount">
    <option value="1">1 Tick</option>
    <option value="2">2 Ticks</option>
    <option value="3">3 Ticks</option>
    <option value="4">4 Ticks</option>
    <option value="5">5 Ticks</option>
    <option value="6">6 Ticks</option>
    <option value="7">7 Ticks</option>
    <option value="8">8 Ticks</option>
    <option value="9">9 Ticks</option>
    <option value="10" selected>10 Ticks</option>
</select>

</div>

<div class="card">

<h2>AI Prediction Result</h2>

<div class="result">

<p id="prediction">
Waiting for analysis...
</p>

<p class="confidence" id="confidence">
Confidence: --
</p>

<button onclick="resetPrediction(); generatePrediction();">
New Prediction
</button>

</div>

</div>


<div class="card">

<h2>Market Insight</h2>

<p id="insight">
Select a market and prediction type to generate analysis.
</p>

</div>

<div class="card">

<h2>Prediction History</h2>

<div id="history">
No predictions yet.
</div>

</div>

</div>

<script>

const API_TOKEN = "pat_6a71012ddcb922c2db52bb4458b45cb986ca26e28ac58d44e9cba4d9841321c3";

let predictionHistory = [];
let liveDigits = [];

const ws = new WebSocket(
  "wss://ws.derivws.com/websockets/v3?app_id=1089"
);
    
ws.addEventListener("open", function () {
    ws.send(JSON.stringify({
        authorize: API_TOKEN
    }));

    ws.send(JSON.stringify({
    ticks: "R_100",
    subscribe: 1
    }));
});
ws.addEventListener("message", function (event) {
    const data = JSON.parse(event.data);
    if (data.tick) {

    const price = data.tick.quote.toString();

    const lastDigit = Number(price.slice(-1));

    liveDigits.push(lastDigit);

    const maxTicks = Number(document.getElementById("tickCount").value);

if (liveDigits.length > maxTicks) {
    liveDigits.shift();
}
    document.getElementById("insight").innerHTML =
        "Live Price: " + price +
        "<br>Collected Digits: " + liveDigits.length;
}
});
    
function generatePrediction(){

document.getElementById("prediction").innerHTML =
"🔄 Scanning market ticks...";

 

document.getElementById("confidence").innerHTML =
"Analyzing...";

document.getElementById("insight").innerHTML =
"AI is calculating probability...";

setTimeout(function(){

document.getElementById("prediction").innerHTML =
"📊 Detecting patterns...";

document.getElementById("confidence").innerHTML =
"Calculating probability...";

document.getElementById("insight").innerHTML =
"Comparing recent digit behavior...";

},1000);

setTimeout(function(){

let market = document.getElementById("market").value;

let type = document.getElementById("predictionType").value;

if (liveDigits.length < 1) {
    document.getElementById("prediction").innerHTML =
        "Waiting for enough live market data...";
    return;
}

const selectedTicks = Number(document.getElementById("tickCount").value);

let digits = liveDigits.slice(-selectedTicks);

let frequency = {};

digits.forEach(function(digit){
    frequency[digit] = (frequency[digit] || 0) + 1;
});

let sortedDigits = Object.keys(frequency).sort(function(a,b){
    return frequency[b] - frequency[a];
});

let hotDigits = sortedDigits.slice(0,3);

let coldDigits = sortedDigits.slice(-3);

let number;

if(type === "Matches Prediction"){

number = hotDigits[0];
}

if(type === "Differs Prediction"){

number = coldDigits[0];

}

if(type === "Even Prediction"){
    let evenNumbers = [0,2,4,6,8];
    number = evenNumbers[Math.floor(Math.random() * evenNumbers.length)];
}

if(type === "Odd Prediction"){
    let oddNumbers = [1,3,5,7,9];
    number = oddNumbers[Math.floor(Math.random() * oddNumbers.length)];
}

if(type === "Over Prediction"){
    let overNumbers = [5,6,7,8,9];
    number = overNumbers[Math.floor(Math.random() * overNumbers.length)];
}

if(type === "Under Prediction"){
    let underNumbers = [0,1,2,3,4];
    number = underNumbers[Math.floor(Math.random() * underNumbers.length)];
}

let confidence = 60 + Math.floor(Math.random() * 30);

if(type === "Matches Prediction" || type === "Differs Prediction"){
    confidence += 5;
}

if(confidence > 95){
    confidence = 95;
}


document.getElementById("prediction").innerHTML =
type + ": " + number;


document.getElementById("confidence").innerHTML =
"Confidence: " + confidence + "%";

predictionHistory.unshift(
type + ": " + number + " | Confidence: " + confidence + "%"
);

if(predictionHistory.length > 5){
    predictionHistory.pop();
}

document.getElementById("history").innerHTML =
predictionHistory.join("<br><br>");
console.log("Live Digits:", liveDigits);
document.getElementById("insight").innerHTML =
"Analyzing " + market +
" using " + type +
" pattern analysis.<br><br>" +
"Digit frequency check completed.<br>" +
"Hot Digits: " + hotDigits.join(", ") + "<br>" +
"Cold Digits: " + coldDigits.join(", ") + "<br>" +
"Sample digits analyzed: " + digits.join(", ");

}, 2000);

}

function resetPrediction(){

predictionHistory = [];
    
document.getElementById("prediction").innerHTML =
"Waiting for analysis...";

document.getElementById("confidence").innerHTML =
"Confidence: --";

document.getElementById("insight").innerHTML =
"Select a market and prediction type to generate analysis.";

document.getElementById("history").innerHTML =
"No predictions yet.";

}

</script>

</body>

</html>
