<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean Slate</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#38bdf8;
}

.container{
    padding:20px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
}

select,button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    margin-top:10px;
}

button{
    background:#38bdf8;
    color:#0f172a;
    font-weight:bold;
}

h2{
    margin-top:0;
}

#result{
    font-size:22px;
    text-align:center;
    margin-top:20px;
    color:#22c55e;
}
</style>

</head>

<body>

<header>
Clean Slate
</header>

<div class="card">

<h2>Matches Prediction</h2>

<select id="matchType">
<option>Matches Even</option>
<option>Matches Odd</option>
<option>Matches Differ</option>
<option>Over/Under</option>
</select>

<button onclick="predictMatch()">
Predict Match
</button>

<div id="matchResult"></div>

</div>
    
<div class="container">

<div class="card">

<h2>Select Market</h2>

<select>
<option>Volatility 100 (1s)</option>
<option>Volatility 75 (1s)</option>
<option>Volatility 50 (1s)</option>
<option>Volatility 25 (1s)</option>
</select>

</div>

<div class="card">

<h2>Even/Odd Analysis</h2>

<p>Even Digits: <b>12</b></p>

<p>Odd Digits: <b>8</b></p>

<p>Confidence: <b>60%</b></p>

<button onclick="analyze()">
Analyze Market
</button>

<div id="result"></div>

</div>

</div>

<script>

function analyze(){

document.getElementById("result").innerHTML =
"Market analyzed successfully. Live market connection will be added next.";

} 

function predictMatch(){

document.getElementById("matchResult").innerHTML =
"Prediction generated. Advanced market analysis will be added next.";

}

</script>

</body>
</html>
