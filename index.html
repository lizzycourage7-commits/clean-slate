<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean Slate</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      text-align:center;
    }

    .card{
      background:#1e293b;
      padding:30px;
      border-radius:20px;
      width:90%;
      max-width:400px;
      box-shadow:0 0 20px rgba(0,0,0,.4);
    }

    h1{
      color:#38bdf8;
      margin-bottom:10px;
    }

    p{
      color:#cbd5e1;
      margin-bottom:25px;
    }

    button{
      background:#38bdf8;
      color:#0f172a;
      border:none;
      padding:15px 25px;
      border-radius:12px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      opacity:.9;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Clean Slate</h1>
  <p>AI Trading Analysis Platform</p>

  <button onclick="welcome()">
    Get Started
  </button>
</div>

<script>
function welcome(){
  alert("Welcome to Clean Slate! Your project is working.");
}
</script>

</body>
</html>
